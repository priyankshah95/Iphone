<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A little something for you</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f4ff;
    overflow: hidden;
  }

  .screen { display: none; flex-direction: column; align-items: center; text-align: center; padding: 2rem; }
  .screen.active { display: flex; }

  .bubble {
    position: fixed;
    border-radius: 50%;
    animation: float linear infinite;
    pointer-events: none;
    z-index: 0;
    opacity: 0.15;
    background: #4f8ef7;
  }
  @keyframes float {
    0%   { transform: translateY(110vh) scale(1); }
    100% { transform: translateY(-40px) scale(1.1); }
  }

  #ask-screen { gap: 2rem; max-width: 420px; position: relative; z-index: 1; }

  .card {
    background: white;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    box-shadow: 0 6px 32px rgba(79,142,247,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.8rem;
  }

  .phone-icon {
    font-size: 64px;
    animation: wiggle 2s ease-in-out infinite;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }

  .question {
    font-size: 21px;
    font-weight: 600;
    color: #222;
    line-height: 1.5;
  }

  .btn-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  #yes-btn {
    padding: 13px 40px;
    font-size: 17px;
    font-weight: 600;
    background: #d0d0d0;
    color: #888;
    border: none;
    border-radius: 50px;
    cursor: not-allowed;
    user-select: none;
    white-space: nowrap;
  }

  #no-btn-fixed {
    position: fixed;
    padding: 10px 28px;
    font-size: 15px;
    background: white;
    color: #aaa;
    border: 1px solid #ddd;
    border-radius: 50px;
    cursor: pointer;
    z-index: 999;
    user-select: none;
  }

  #no-btn-card {
    padding: 13px 40px;
    font-size: 17px;
    font-weight: 600;
    background: #4f8ef7;
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(79,142,247,0.4);
    white-space: nowrap;
  }
  #no-btn-card:hover { background: #2f6fd4; }
  #no-btn-card:active { transform: scale(0.97); }

  #yes-screen { gap: 1.5rem; max-width: 440px; position: relative; z-index: 1; }

  .yes-card {
    background: white;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    box-shadow: 0 6px 32px rgba(79,142,247,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    animation: fadein 0.6s ease;
  }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .big-phone { font-size: 80px; animation: pop 0.5s ease forwards; }
  @keyframes pop {
    0%   { transform: scale(0); opacity: 0; }
    70%  { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); }
  }

  .confirm-text {
    font-size: 22px;
    font-weight: 700;
    color: #4f8ef7;
    line-height: 1.4;
  }
  .sub-text { font-size: 15px; color: #888; }
  .confetti-row { font-size: 30px; letter-spacing: 8px; }
</style>
</head>
<body>

<div id="ask-screen" class="screen active">
  <div class="card">
    <div class="phone-icon">&#128241;</div>
    <p class="question">I will buy you an iPhone if you can hit Yes</p>
    <div class="btn-row">
      <button id="yes-btn" onmouseenter="floatYes()" ontouchstart="floatYes(event)">Yes</button>
      <button id="no-btn-card" onclick="sayNo()">No</button>
    </div>
  </div>
</div>

<button id="no-btn-fixed" style="display:none;">Yes</button>

<div id="yes-screen" class="screen">
  <div class="yes-card">
    <div class="big-phone">&#128241;</div>
    <p class="confirm-text">No you have to buy me an iPhone</p>
    <p class="sub-text">You said it, no take-backs! &#128514;</p>
    <p class="confetti-row">&#127881;&#128241;&#129395;&#127881;</p>
  </div>
</div>

<script>
  (function() {
    for (var i = 0; i < 14; i++) {
      var b = document.createElement('div');
      b.className = 'bubble';
      var size = 30 + Math.random() * 80;
      b.style.width  = size + 'px';
      b.style.height = size + 'px';
      b.style.left = (Math.random() * 100) + 'vw';
      b.style.animationDuration = (6 + Math.random() * 8) + 's';
      b.style.animationDelay = (Math.random() * 10) + 's';
      document.body.appendChild(b);
    }

    var yesBtn = document.getElementById('yes-btn');
    var yesX = 0, yesY = 0;
    var placed = false;

    window.floatYes = function(e) {
      if (e) e.preventDefault();
      if (!placed) {
        var r = yesBtn.getBoundingClientRect();
        yesX = r.left; yesY = r.top;
        yesBtn.style.position = 'fixed';
        yesBtn.style.left = yesX + 'px';
        yesBtn.style.top  = yesY + 'px';
        yesBtn.style.zIndex = 998;
        placed = true;
      }
      var margin = 60;
      var bw = yesBtn.offsetWidth || 100;
      var bh = yesBtn.offsetHeight || 44;
      var nx, ny, tries = 0;
      do {
        nx = margin + Math.random() * (window.innerWidth  - bw - 2 * margin);
        ny = margin + Math.random() * (window.innerHeight - bh - 2 * margin);
        tries++;
      } while (Math.abs(nx - yesX) < 140 && Math.abs(ny - yesY) < 90 && tries < 20);
      yesX = nx; yesY = ny;
      yesBtn.style.left = yesX + 'px';
      yesBtn.style.top  = yesY + 'px';
    };

    window.sayNo = function() {
      document.getElementById('ask-screen').classList.remove('active');
      yesBtn.style.display = 'none';
      document.getElementById('yes-screen').classList.add('active');
    };
  })();
</script>
</body>
</html>
